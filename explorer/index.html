<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lumenqraph Explorer</title>
  <!-- Inline so the page stays a single self-contained file and the browser
       never issues a /favicon.ico request the API would answer with a 404. -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%2032%2032%27%3E%3Crect%20width%3D%2732%27%20height%3D%2732%27%20rx%3D%277%27%20fill%3D%27%235566ff%27%2F%3E%3Cpath%20d%3D%27M8%2024L16%209L24%2019%27%20fill%3D%27none%27%20stroke%3D%27%23fff%27%20stroke-width%3D%273%27%20stroke-linecap%3D%27round%27%20stroke-linejoin%3D%27round%27%2F%3E%3Ccircle%20cx%3D%278%27%20cy%3D%2724%27%20r%3D%274%27%20fill%3D%27%23fff%27%2F%3E%3Ccircle%20cx%3D%2716%27%20cy%3D%279%27%20r%3D%274%27%20fill%3D%27%23fff%27%2F%3E%3Ccircle%20cx%3D%2724%27%20cy%3D%2719%27%20r%3D%274%27%20fill%3D%27%23fff%27%2F%3E%3C%2Fsvg%3E" />
  <style>
    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --surface: #f6f7f9;
      --surface-2: #eef0f3;
      --border: #d8dce3;
      --ink: #1a1d24;
      --ink-2: #4a505c;
      --muted: #7b8291;
      --accent: #5566ff;
      --accent-soft: #5566ff1f;
      --good: #1f9d57;
      --warn: #b5820a;
      --crit: #d23b3b;
      --good-soft: #1f9d571f;
      --warn-soft: #b5820a1f;
      --crit-soft: #d23b3b1f;
      --radius: 10px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #14161b;
        --surface: #1b1e25;
        --surface-2: #22262f;
        --border: #333944;
        --ink: #e8eaef;
        --ink-2: #b3b9c5;
        --muted: #7f8794;
        --accent: #8f9cff;
        --accent-soft: #8f9cff26;
        --good: #46c983;
        --warn: #e0b64b;
        --crit: #f0736f;
        --good-soft: #46c98326;
        --warn-soft: #e0b64b26;
        --crit-soft: #f0736f26;
      }
    }
    * { box-sizing: border-box; }
    body {
      font: 15px/1.55 system-ui, -apple-system, Segoe UI, sans-serif;
      margin: 0; background: var(--bg); color: var(--ink);
    }
    .container { max-width: 1200px; margin-inline: auto; padding: 1.25rem 1.25rem 3rem; }
    header.app { display: flex; flex-wrap: wrap; align-items: center; gap: .75rem 1rem; margin-bottom: 1.25rem; }
    .brand { display: flex; align-items: baseline; gap: .55rem; }
    .brand h1 { margin: 0; font-size: 1.4rem; letter-spacing: -.01em; }
    .brand .tag { color: var(--muted); font-size: .82rem; }
    .conn { display: flex; flex-wrap: wrap; gap: .4rem; margin-left: auto; }
    input, button, select {
      font: inherit; padding: .42rem .6rem; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg); color: inherit;
    }
    input::placeholder { color: var(--muted); }
    button { cursor: pointer; background: var(--surface); }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button:hover { filter: brightness(1.05); }
    a { color: var(--accent); }

    /* KPI row */
    .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: .7rem; margin-bottom: 1.4rem; }
    .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: .7rem .85rem; }
    .kpi .label { font-size: .72rem; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
    .kpi .value { font-size: 1.45rem; font-weight: 600; margin-top: .15rem; font-variant-numeric: tabular-nums; }
    .kpi .value.small { font-size: 1.05rem; font-weight: 600; }
    .status { display: inline-flex; align-items: center; gap: .4rem; }
    .dot { width: .62rem; height: .62rem; border-radius: 50%; background: var(--muted); flex: none; }
    .dot.good { background: var(--good); } .dot.warn { background: var(--warn); } .dot.crit { background: var(--crit); }

    /* Layout */
    .grid { display: grid; grid-template-columns: 300px 1fr; gap: 1.1rem; align-items: start; }
    @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .panel > h2 { margin: 0; font-size: .8rem; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); padding: .7rem .85rem; border-bottom: 1px solid var(--border); }

    .clist { list-style: none; margin: 0; padding: .35rem; max-height: 72vh; overflow: auto; }
    .clist li { padding: .5rem .6rem; border-radius: 8px; cursor: pointer; }
    .clist li:hover { background: var(--surface-2); }
    .clist li.active { background: var(--accent-soft); outline: 1px solid var(--accent); }
    .clist .cid { font-family: ui-monospace, monospace; font-size: .74rem; word-break: break-all; }
    .clist .meta { font-size: .74rem; color: var(--muted); margin-top: .1rem; }

    .tabs { display: flex; flex-wrap: wrap; gap: .25rem; padding: .55rem .6rem; border-bottom: 1px solid var(--border); }
    .tabs button { padding: .3rem .7rem; border-radius: 999px; font-size: .82rem; }
    .tabs button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .detail-head { padding: .7rem .85rem; border-bottom: 1px solid var(--border); font-size: .8rem; color: var(--ink-2); }
    .detail-head code { font-family: ui-monospace, monospace; word-break: break-all; }
    .decodebar { display: flex; gap: .4rem; align-items: center; flex-wrap: wrap; }
    .decodebar input { flex: 1 1 16rem; min-width: 0; }
    .detail-title { margin-top: .5rem; }
    .detail-title:empty { display: none; }
    .body { padding: .5rem; overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    th, td { text-align: left; padding: .4rem .55rem; border-bottom: 1px solid var(--border); vertical-align: top; }
    th { color: var(--muted); font-weight: 600; position: sticky; top: 0; background: var(--surface); }
    td code, .mono { font-family: ui-monospace, monospace; font-size: 11.5px; word-break: break-all; }
    tr:hover td { background: var(--surface-2); }
    .pill { display: inline-block; padding: .05rem .45rem; border-radius: 999px; background: var(--accent-soft); color: var(--accent); font-size: 11px; font-weight: 600; }
    a.ext { text-decoration: none; white-space: nowrap; }
    a.ext:hover { text-decoration: underline; }
    a.ext code { color: var(--accent); }
    pre { margin: 0; padding: .6rem .7rem; background: var(--surface-2); border-radius: 8px; font-size: 11.5px; overflow-x: auto; }
    .empty { padding: 1.5rem; color: var(--muted); text-align: center; }
    .rowbar { display: flex; gap: .45rem; flex-wrap: wrap; align-items: center; padding: .5rem .6rem; }
    .rowbar input { padding: .3rem .5rem; }
    .toast { position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%); background: var(--crit); color: #fff; padding: .5rem .9rem; border-radius: 8px; font-size: .85rem; opacity: 0; transition: opacity .2s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .muted { color: var(--muted); }

    /* Upgrade timeline: a contract's on-chain interface over time, newest first.
       The rail is drawn as a left border so it connects the dots automatically,
       however tall each entry grows. */
    .summary { padding: .5rem .7rem; font-size: 12.5px; color: var(--ink-2); border-bottom: 1px solid var(--border); display: flex; gap: .5rem; flex-wrap: wrap; align-items: center; }
    .timeline { list-style: none; margin: 0; padding: .8rem .7rem .3rem 1.1rem; }
    .tl-item { position: relative; padding: 0 0 1.15rem 1.15rem; border-left: 2px solid var(--border); }
    .tl-item:last-child { border-left-color: transparent; padding-bottom: .3rem; }
    .tl-dot { position: absolute; left: -.47rem; top: .2rem; width: .72rem; height: .72rem; border-radius: 50%;
              background: var(--muted); border: 2px solid var(--bg); }
    .tl-dot.crit { background: var(--crit); } .tl-dot.good { background: var(--good); }
    .tl-head { display: flex; align-items: center; gap: .45rem; flex-wrap: wrap; }
    .tl-head .ver { font-weight: 600; font-variant-numeric: tabular-nums; }
    .tl-when { font-size: 12px; color: var(--muted); }
    .tl-hash { font-family: ui-monospace, monospace; font-size: 11px; color: var(--muted); margin-top: .15rem; }
    .tl-note { font-size: 12.5px; color: var(--muted); margin-top: .3rem; }
    .badge { font-size: 10px; font-weight: 700; padding: .08rem .42rem; border-radius: 999px;
             text-transform: uppercase; letter-spacing: .04em; }
    .badge.crit { background: var(--crit-soft); color: var(--crit); }
    .badge.good { background: var(--good-soft); color: var(--good); }
    .badge.mute { background: var(--surface-2); color: var(--muted); }
    /* Change lines read like a diff: the sign carries the meaning, so they stay
       legible if colour is unavailable. */
    .changes { list-style: none; margin: .45rem 0 0; padding: 0; }
    .changes li { font-family: ui-monospace, monospace; font-size: 11.5px; line-height: 1.5;
                  padding: .08rem .4rem; border-radius: 4px; white-space: pre-wrap; word-break: break-word; }
    .changes li.add { color: var(--good); background: var(--good-soft); }
    .changes li.rm  { color: var(--crit); background: var(--crit-soft); }
    .changes li.ch  { color: var(--warn); background: var(--warn-soft); }
    .changes li.sub { background: none; padding-left: 1.6rem; opacity: .95; }
  </style>
</head>
<body>
<div class="container">
  <header class="app">
    <div class="brand">
      <h1>Lumenqraph</h1>
      <span class="tag">Explorer &amp; self-host dashboard</span>
    </div>
    <div class="conn">
      <input id="base" size="26" value="" placeholder="API base (blank = same origin)" title="API base URL — leave blank when the page is served by/behind the API" />
      <input id="key" size="16" placeholder="x-api-key (optional)" />
      <select id="senet" title="Stellar.Expert network for ↗ links">
        <option value="public">mainnet</option>
        <option value="testnet">testnet</option>
      </select>
      <button class="primary" onclick="connect()">Load</button>
    </div>
  </header>

  <!-- Health / indexing status -->
  <section class="kpis" id="kpis">
    <div class="kpi"><div class="label">Indexer</div><div class="value small"><span class="status"><span id="statusDot" class="dot"></span><span id="statusText">—</span></span></div></div>
    <div class="kpi"><div class="label">Lag (ledgers)</div><div class="value" id="kLag">—</div></div>
    <div class="kpi"><div class="label">Processed ledger</div><div class="value small" id="kProcessed">—</div></div>
    <div class="kpi"><div class="label">Chain tip</div><div class="value small" id="kTip">—</div></div>
    <div class="kpi"><div class="label">Events indexed</div><div class="value" id="kEvents">—</div></div>
    <div class="kpi"><div class="label">Errors</div><div class="value" id="kErrors">—</div></div>
  </section>

  <div class="grid">
    <!-- Contracts -->
    <aside class="panel">
      <h2>Indexed contracts</h2>
      <ul class="clist" id="clist"><li class="muted" style="cursor:default">Connect to load…</li></ul>
    </aside>

    <!-- Detail -->
    <main class="panel">
      <div class="tabs" id="tabs">
        <button data-tab="events" class="active" onclick="setTab('events')">Events</button>
        <button data-tab="transfers" onclick="setTab('transfers')">Transfers</button>
        <button data-tab="state" onclick="setTab('state')">State</button>
        <button data-tab="holders" onclick="setTab('holders')">Holders</button>
        <button data-tab="interface" onclick="setTab('interface')">Interface</button>
        <button data-tab="upgrades" onclick="setTab('upgrades')">Upgrades</button>
      </div>
      <div class="detail-head" id="detailHead">
        <div class="decodebar">
          <span class="muted">Decode any contract:</span>
          <input id="anyCid" size="40" placeholder="contract id (C…)"
                 onkeydown="if(event.key==='Enter')decodeAny()" />
          <button onclick="decodeAny()">Decode</button>
        </div>
        <div id="detailTitle" class="detail-title"></div>
      </div>
      <div class="body" id="detail"><div class="empty">No contract selected.</div></div>
    </main>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const base = () => $('base').value.replace(/\/+$/, '');
const headers = () => $('key').value ? { 'x-api-key': $('key').value } : {};

// ---- Stellar.Expert deep links ----
const seNet = () => $('senet').value;
const seUrl = (type, val) => `https://stellar.expert/explorer/${seNet()}/${type}/${encodeURIComponent(val)}`;
// A short, monospace external link to a Stellar.Expert page (contract/tx/account).
function seLink(type, val, n = 8) {
  if (!val) return '<span class="muted">—</span>';
  return `<a class="ext" href="${seUrl(type, val)}" target="_blank" rel="noopener" title="${esc(val)}"><code>${esc(short(val, n))}</code> ↗</a>`;
}
let selected = null;
let tab = 'events';
let healthTimer = null;
// When set, the Interface tab shows this historical version instead of the
// current one (set by clicking a version in the upgrade timeline).
let ifaceVersion = null;

function toast(msg) {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}
function fmt(n) { return (n === null || n === undefined) ? '—' : Number(n).toLocaleString(); }
function fmtDate(s) {
  if (!s) return '—';
  const d = new Date(s);
  return isNaN(d.getTime()) ? esc(s) : d.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
}
function esc(s) { return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function short(s, n = 12) { s = String(s); return s.length > n * 2 ? s.slice(0, n) + '…' + s.slice(-n) : s; }
function cell(v) {
  if (v === null || v === undefined) return '<span class="muted">—</span>';
  if (typeof v === 'object') return `<code>${esc(JSON.stringify(v))}</code>`;
  return `<code>${esc(v)}</code>`;
}

async function get(path) {
  const r = await fetch(base() + path, { headers: headers() });
  if (!r.ok) {
    let msg = 'HTTP ' + r.status;
    try { const b = await r.json(); if (b.error) msg = b.error; } catch {}
    throw new Error(msg);
  }
  return r.json();
}

function connect() {
  loadHealth();
  loadContracts();
  if (healthTimer) clearInterval(healthTimer);
  healthTimer = setInterval(loadHealth, 10000);
}

async function loadHealth() {
  try {
    const h = await get('/health');
    const lag = h.lag_ledgers ?? h.lag ?? null;
    $('kLag').textContent = fmt(lag);
    $('kProcessed').textContent = fmt(h.last_processed_ledger);
    $('kTip').textContent = fmt(h.chain_tip_ledger ?? h.chain_tip);
    $('kEvents').textContent = fmt(h.events_ingested_total);
    $('kErrors').textContent = fmt(h.errors_total);
    // Status: healthy if caught up, warning if lagging, critical if far behind.
    let cls = 'good', label = 'healthy';
    if (lag === null) { cls = 'good'; label = h.status || 'up'; }
    else if (lag > 500) { cls = 'crit'; label = 'far behind'; }
    else if (lag > 50) { cls = 'warn'; label = 'lagging'; }
    $('statusDot').className = 'dot ' + cls;
    $('statusText').textContent = label;
  } catch (e) {
    $('statusDot').className = 'dot crit';
    $('statusText').textContent = 'unreachable';
    toast('Health: ' + e.message);
  }
}

async function loadContracts() {
  try {
    const rows = await get('/contracts');
    const ul = $('clist');
    if (!rows.length) { ul.innerHTML = '<li class="muted" style="cursor:default">No contracts indexed yet.</li>'; return; }
    ul.innerHTML = '';
    for (const c of rows) {
      const li = document.createElement('li');
      li.className = c.contract_id === selected ? 'active' : '';
      li.innerHTML = `<div class="cid">${esc(short(c.contract_id, 10))}
          <a class="ext" href="${seUrl('contract', c.contract_id)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="View on Stellar.Expert">↗</a></div>
        <div class="meta">${fmt(c.event_count)} events · ledgers ${fmt(c.first_seen_ledger)}–${fmt(c.last_seen_ledger)}</div>`;
      li.onclick = () => selectContract(c.contract_id);
      ul.appendChild(li);
    }
    if (!selected && rows[0]) selectContract(rows[0].contract_id);
  } catch (e) { toast('Contracts: ' + e.message); }
}

function selectContract(cid) {
  selected = cid;
  // Version pins are per-contract; carrying one across would show v2 of a
  // contract the user never asked about.
  ifaceVersion = null;
  document.querySelectorAll('.clist li').forEach(li => li.classList.remove('active'));
  [...document.querySelectorAll('.clist li')].forEach(li => {
    if (li.querySelector('.cid') && cid.startsWith(li.querySelector('.cid').textContent.split('…')[0])) li.classList.add('active');
  });
  $('detailTitle').innerHTML = `Contract <a class="ext" href="${seUrl('contract', cid)}" target="_blank" rel="noopener"><code>${esc(cid)}</code> ↗</a>`;
  loadTab();
}

function setTab(t) {
  // Clicking a tab always means "show me the live view", so drop any pinned
  // historical version; viewVersion() sets it again on its way in.
  ifaceVersion = null;
  tab = t;
  document.querySelectorAll('.tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === t));
  loadTab();
}

function table(rows, cols) {
  if (!rows || !rows.length) return '<div class="empty">Nothing here yet.</div>';
  let h = '<table><thead><tr>' + cols.map(c => `<th>${c.label}</th>`).join('') + '</tr></thead><tbody>';
  for (const r of rows) {
    h += '<tr>' + cols.map(c => `<td>${c.render ? c.render(r) : cell(r[c.key])}</td>`).join('') + '</tr>';
  }
  return h + '</tbody></table>';
}

async function loadTab() {
  if (!selected) { $('detail').innerHTML = '<div class="empty">No contract selected.</div>'; return; }
  const cid = selected;
  $('detail').innerHTML = '<div class="empty">Loading…</div>';
  try {
    if (tab === 'events') {
      const rows = await get(`/contracts/${cid}/events?limit=50`);
      $('detail').innerHTML = table(rows, [
        { label: 'Ledger', key: 'ledger' },
        { label: 'Event', render: r => `<span class="pill">${esc(r.event_name ?? r.event_type)}</span>` },
        { label: 'Typed / decoded', render: r => `<code>${esc(JSON.stringify(r.enriched ?? r.decoded_value))}</code>` },
        { label: 'Tx', render: r => seLink('tx', r.tx_hash) },
      ]);
    } else if (tab === 'transfers') {
      const rows = await get(`/contracts/${cid}/transfers?limit=50`);
      $('detail').innerHTML = table(rows, [
        { label: 'Ledger', key: 'ledger' },
        { label: 'From', render: r => seLink('account', r.from_addr) },
        { label: 'To', render: r => seLink('account', r.to_addr) },
        { label: 'Amount', key: 'amount' },
      ]);
    } else if (tab === 'state') {
      const s = await get(`/contracts/${cid}/state?limit=1`);
      const v = s.versions && s.versions[0];
      $('detail').innerHTML = v
        ? `<div class="muted" style="padding:.4rem .6rem">Instance storage @ ledger ${fmt(v.ledger)} · captured ${esc(v.captured_at)}</div><pre>${esc(JSON.stringify(v.storage, null, 2))}</pre>`
        : '<div class="empty">No state snapshots (enable STATE_INDEXING on the indexer).</div>';
    } else if (tab === 'holders') {
      const d = await get(`/contracts/${cid}/data?label=balance&limit=200`);
      $('detail').innerHTML = table(d.keys, [
        { label: 'Holder / key', render: r => `<code>${esc(short(JSON.stringify(r.key), 14))}</code>` },
        { label: 'Value', render: r => `<code>${esc(JSON.stringify(r.value))}</code>` },
        { label: 'Ledger', key: 'ledger' },
      ]);
    } else if (tab === 'interface') {
      await renderInterface(cid, ifaceVersion);
    } else if (tab === 'upgrades') {
      await renderUpgrades(cid);
    }
  } catch (e) {
    $('detail').innerHTML = `<div class="empty">${esc(e.message)}</div>`;
  }
}

// ---- Upgrade timeline -------------------------------------------------------
// A Soroban contract can be upgraded in place, so its interface is a time
// series. This renders that history newest-first, with each version's diff
// against the one before it.

/// One version's diff as +/- lines, grouped by section. Renders from the
/// structured diff rather than its `summary` strings so a *changed* item can
/// show its before and after on separate lines.
function diffLines(diff) {
  const out = [];
  for (const [kind, sec] of [['function', diff.functions], ['event', diff.events], ['type', diff.types]]) {
    if (!sec) continue;
    for (const sig of sec.removed || []) out.push(`<li class="rm">− removed ${kind} ${esc(sig)}</li>`);
    for (const it of sec.changed || []) {
      out.push(`<li class="ch">~ changed ${kind} ${esc(it.name)}</li>`);
      out.push(`<li class="rm sub">− ${esc(it.from)}</li>`);
      out.push(`<li class="add sub">+ ${esc(it.to)}</li>`);
    }
    for (const sig of sec.added || []) out.push(`<li class="add">+ added ${kind} ${esc(sig)}</li>`);
  }
  // An upgrade with no interface changes is a code-only change (e.g. a bug
  // fix) — worth showing as an upgrade, but there's nothing to react to.
  return out.length
    ? `<ul class="changes">${out.join('')}</ul>`
    : '<div class="tl-note">Interface unchanged — code-only upgrade.</div>';
}

function versionItem(cid, v) {
  const isBaseline = v.version === 1;
  const dot = v.breaking ? 'crit' : isBaseline ? '' : 'good';
  const badge = v.breaking
    ? '<span class="badge crit">breaking</span>'
    : isBaseline
      ? '<span class="badge mute">baseline</span>'
      : '<span class="badge good">compatible</span>';

  let body;
  if (isBaseline) {
    body = '<div class="tl-note">First interface observed — the baseline this history is measured from, not an upgrade.</div>';
  } else if (!v.diff) {
    // version > 1 with no diff: the previous spec section couldn't be re-parsed.
    body = '<div class="tl-note">Upgraded, but the previous interface could not be re-parsed — no diff available.</div>';
  } else {
    body = diffLines(v.diff);
  }

  const prev = v.previous_wasm_hash ? ` ← ${esc(short(v.previous_wasm_hash, 6))}` : '';
  return `<li class="tl-item">
    <span class="tl-dot ${dot}"></span>
    <div class="tl-head">
      <span class="ver">v${v.version}</span>
      ${badge}
      <span class="tl-when">${fmtDate(v.observed_at)}</span>
      <a href="#" onclick="viewVersion('${esc(cid)}',${v.version});return false;" title="Show the full interface at this version">interface</a>
    </div>
    <div class="tl-hash" title="${esc(v.wasm_hash || '')}">wasm ${esc(short(v.wasm_hash || '—', 6))}${prev}</div>
    ${body}
  </li>`;
}

async function renderUpgrades(cid) {
  const h = await get(`/contracts/${cid}/interface/history?limit=100`);
  const vs = h.versions || [];
  if (!vs.length) { $('detail').innerHTML = '<div class="empty">No interface history for this contract.</div>'; return; }

  const upgrades = vs.filter(v => v.version > 1).length;
  const breaking = vs.filter(v => v.breaking).length;
  const summary = upgrades === 0
    ? '<span>No upgrades observed — this contract\'s interface hasn\'t changed since indexing began.</span>'
    : `<span><strong>${fmt(upgrades)}</strong> upgrade${upgrades === 1 ? '' : 's'} observed</span>
       <span class="muted">·</span>
       <span>${breaking ? `<span class="badge crit">${fmt(breaking)} breaking</span>` : '<span class="badge good">none breaking</span>'}</span>`;

  $('detail').innerHTML =
    `<div class="summary">${summary}</div>
     <ol class="timeline">${vs.map(v => versionItem(cid, v)).join('')}</ol>`;
}

/// Jump to the Interface tab pinned to a historical version.
function viewVersion(cid, n) {
  ifaceVersion = n;
  tab = 'interface';
  document.querySelectorAll('.tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === 'interface'));
  loadTab();
}

// ---- Interface rendering ----------------------------------------------------
// Signatures are rendered in the same shape core::diff uses for the upgrade
// timeline, so the same function reads identically in both tabs.

/// A type name. The API renders these to strings server-side; the object guard
/// is just so an unexpected shape degrades to visible JSON instead of
/// "[object Object]".
const tn = t => (t && typeof t === 'object') ? JSON.stringify(t) : String(t ?? '?');

/// `balance(id: Address) -> i128`
function fnSig(f) {
  const ins = (f.inputs || []).map(a => `${a.name}: ${tn(a.type)}`).join(', ');
  const outs = f.outputs || [];
  const out = outs.length === 0 ? 'void' : outs.length === 1 ? tn(outs[0]) : `(${outs.map(tn).join(', ')})`;
  return `${f.name}(${ins}) -> ${out}`;
}

/// `transfer(from: Address @topic, amount: i128 @data) [single]` — the location
/// of each param and the body's data format decide how a consumer decodes the
/// event, so they belong in the signature, not hidden in a JSON blob.
function evSig(e) {
  const ps = (e.params || []).map(p => `${p.name}: ${tn(p.type)} @${p.location}`).join(', ');
  return `${e.name}(${ps}) [${e.data_format}]`;
}

/// Structs, unions, and enums, each rendered like its Rust declaration.
function typeRows(i) {
  const rows = [];
  for (const s of i.structs || [])
    rows.push([s.name, `struct ${s.name} { ${(s.fields || []).map(f => `${f.name}: ${tn(f.type)}`).join(', ')} }`]);
  for (const u of i.unions || [])
    rows.push([u.name, `union ${u.name} { ${(u.cases || []).map(c =>
      (c.types && c.types.length) ? `${c.name}(${c.types.map(tn).join(', ')})` : c.name).join(', ')} }`]);
  for (const e of i.enums || [])
    // Enum cases arrive as [name, discriminant] pairs.
    rows.push([e.name, `enum ${e.name} { ${(e.cases || []).map(c => `${c[0]} = ${c[1]}`).join(', ')} }`]);
  return rows;
}

/// A signature cell, with the spec's own doc comment beneath it when present.
function sigCell(sig, doc) {
  return `<code>${esc(sig)}</code>${doc ? `<div class="tl-note" style="margin-top:.15rem">${esc(doc)}</div>` : ''}`;
}

async function renderInterface(cid, version) {
  const iface = await get(`/contracts/${cid}/interface${version ? `?version=${version}` : ''}`);
  const i = iface.interface || iface;
  const fns = (i.functions || [])
    .map(f => `<tr><td><code>${esc(f.name)}</code></td><td>${sigCell(fnSig(f), f.doc)}</td></tr>`).join('');
  const evs = (i.events || [])
    .map(e => `<tr><td><code>${esc(e.name)}</code></td><td>${sigCell(evSig(e), e.doc)}</td></tr>`).join('');
  const tys = typeRows(i)
    .map(([name, sig]) => `<tr><td><code>${esc(name)}</code></td><td><code>${esc(sig)}</code></td></tr>`).join('');
  // When pinned to a historical version, say so loudly — otherwise this reads
  // as the contract's current interface, which it isn't.
  // A typed TS client generated from this exact interface (version-pinned when
  // viewing history) — the on-chain spec turned into code you can import.
  const sdkHref = `${base()}/contracts/${cid}/sdk?lang=ts${version ? `&version=${version}` : ''}`;
  const sdkLink = `<a href="${sdkHref}" download="${esc(cid)}${version ? `.v${version}` : ''}.ts" title="Typed, zero-dependency client generated from this interface">TypeScript client ⬇</a>`;
  const head = version
    ? `<div class="summary"><span>Interface at <strong>v${version}</strong></span>
         <span class="muted">·</span><span class="muted">observed ${fmtDate(iface.observed_at)}</span>
         <span class="muted">·</span><a href="#" onclick="setTab('interface');return false;">show current</a>
         <span class="muted">·</span>${sdkLink}</div>`
    : `<div class="muted" style="padding:.4rem .6rem">${(i.functions||[]).length} functions · ${(i.events||[]).length} events · ${typeRows(i).length} types${iface.fetched_at ? ' · fetched ' + fmtDate(iface.fetched_at) : ''} · ${sdkLink}</div>`;
  const section = (label, col, rows) =>
    rows ? `<div style="height:.6rem"></div><table><thead><tr><th>${label}</th><th>${col}</th></tr></thead><tbody>${rows}</tbody></table>` : '';
  $('detail').innerHTML =
    (head +
     (fns ? `<table><thead><tr><th>Function</th><th>Signature</th></tr></thead><tbody>${fns}</tbody></table>` : '') +
     section('Event', 'Schema', evs) +
     section('Type', 'Definition', tys)) ||
    '<div class="empty">No interface indexed (Stellar Asset Contracts have none).</div>';
}

async function decodeAny() {
  const cid = $('anyCid').value.trim();
  if (!cid) return;
  selected = cid; tab = 'interface'; ifaceVersion = null;
  document.querySelectorAll('.tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === 'interface'));
  $('detailTitle').innerHTML = `Contract <a class="ext" href="${seUrl('contract', cid)}" target="_blank" rel="noopener"><code>${esc(cid)}</code> ↗</a>`;
  $('detail').innerHTML = '<div class="empty">Decoding…</div>';
  try { await renderInterface(cid); }
  catch (e) { $('detail').innerHTML = `<div class="empty">${esc(e.message)}</div>`; }
}

// Auto-connect on load. With a blank base, calls are same-origin — so the page
// works when served by (or behind a proxy in front of) the API, with no CORS.
connect();
</script>
</body>
</html>

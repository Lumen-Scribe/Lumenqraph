<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lumenqraph Explorer</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --surface: #f6f7f9;
      --surface-2: #eef0f3;
      --border: #d8dce3;
      --ink: #1a1d24;
      --ink-2: #4a505c;
      --muted: #7b8291;
      --accent: #5566ff;
      --accent-soft: #5566ff1f;
      --good: #1f9d57;
      --warn: #b5820a;
      --crit: #d23b3b;
      --radius: 10px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #14161b;
        --surface: #1b1e25;
        --surface-2: #22262f;
        --border: #333944;
        --ink: #e8eaef;
        --ink-2: #b3b9c5;
        --muted: #7f8794;
        --accent: #8f9cff;
        --accent-soft: #8f9cff26;
        --good: #46c983;
        --warn: #e0b64b;
        --crit: #f0736f;
      }
    }
    * { box-sizing: border-box; }
    body {
      font: 15px/1.55 system-ui, -apple-system, Segoe UI, sans-serif;
      margin: 0; background: var(--bg); color: var(--ink);
    }
    .container { max-width: 1200px; margin-inline: auto; padding: 1.25rem 1.25rem 3rem; }
    header.app { display: flex; flex-wrap: wrap; align-items: center; gap: .75rem 1rem; margin-bottom: 1.25rem; }
    .brand { display: flex; align-items: baseline; gap: .55rem; }
    .brand h1 { margin: 0; font-size: 1.4rem; letter-spacing: -.01em; }
    .brand .tag { color: var(--muted); font-size: .82rem; }
    .conn { display: flex; flex-wrap: wrap; gap: .4rem; margin-left: auto; }
    input, button, select {
      font: inherit; padding: .42rem .6rem; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg); color: inherit;
    }
    input::placeholder { color: var(--muted); }
    button { cursor: pointer; background: var(--surface); }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button:hover { filter: brightness(1.05); }
    a { color: var(--accent); }

    /* KPI row */
    .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: .7rem; margin-bottom: 1.4rem; }
    .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: .7rem .85rem; }
    .kpi .label { font-size: .72rem; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
    .kpi .value { font-size: 1.45rem; font-weight: 600; margin-top: .15rem; font-variant-numeric: tabular-nums; }
    .kpi .value.small { font-size: 1.05rem; font-weight: 600; }
    .status { display: inline-flex; align-items: center; gap: .4rem; }
    .dot { width: .62rem; height: .62rem; border-radius: 50%; background: var(--muted); flex: none; }
    .dot.good { background: var(--good); } .dot.warn { background: var(--warn); } .dot.crit { background: var(--crit); }

    /* Layout */
    .grid { display: grid; grid-template-columns: 300px 1fr; gap: 1.1rem; align-items: start; }
    @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .panel > h2 { margin: 0; font-size: .8rem; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); padding: .7rem .85rem; border-bottom: 1px solid var(--border); }

    .clist { list-style: none; margin: 0; padding: .35rem; max-height: 72vh; overflow: auto; }
    .clist li { padding: .5rem .6rem; border-radius: 8px; cursor: pointer; }
    .clist li:hover { background: var(--surface-2); }
    .clist li.active { background: var(--accent-soft); outline: 1px solid var(--accent); }
    .clist .cid { font-family: ui-monospace, monospace; font-size: .74rem; word-break: break-all; }
    .clist .meta { font-size: .74rem; color: var(--muted); margin-top: .1rem; }

    .tabs { display: flex; flex-wrap: wrap; gap: .25rem; padding: .55rem .6rem; border-bottom: 1px solid var(--border); }
    .tabs button { padding: .3rem .7rem; border-radius: 999px; font-size: .82rem; }
    .tabs button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .detail-head { padding: .7rem .85rem; border-bottom: 1px solid var(--border); font-size: .8rem; color: var(--ink-2); }
    .detail-head code { font-family: ui-monospace, monospace; word-break: break-all; }
    .body { padding: .5rem; overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    th, td { text-align: left; padding: .4rem .55rem; border-bottom: 1px solid var(--border); vertical-align: top; }
    th { color: var(--muted); font-weight: 600; position: sticky; top: 0; background: var(--surface); }
    td code, .mono { font-family: ui-monospace, monospace; font-size: 11.5px; word-break: break-all; }
    tr:hover td { background: var(--surface-2); }
    .pill { display: inline-block; padding: .05rem .45rem; border-radius: 999px; background: var(--accent-soft); color: var(--accent); font-size: 11px; font-weight: 600; }
    pre { margin: 0; padding: .6rem .7rem; background: var(--surface-2); border-radius: 8px; font-size: 11.5px; overflow-x: auto; }
    .empty { padding: 1.5rem; color: var(--muted); text-align: center; }
    .rowbar { display: flex; gap: .45rem; flex-wrap: wrap; align-items: center; padding: .5rem .6rem; }
    .rowbar input { padding: .3rem .5rem; }
    .toast { position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%); background: var(--crit); color: #fff; padding: .5rem .9rem; border-radius: 8px; font-size: .85rem; opacity: 0; transition: opacity .2s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .muted { color: var(--muted); }
  </style>
</head>
<body>
<div class="container">
  <header class="app">
    <div class="brand">
      <h1>Lumenqraph</h1>
      <span class="tag">Explorer &amp; self-host dashboard</span>
    </div>
    <div class="conn">
      <input id="base" size="26" value="http://localhost:8080" title="API base URL" />
      <input id="key" size="16" placeholder="x-api-key (optional)" />
      <button class="primary" onclick="connect()">Connect</button>
    </div>
  </header>

  <!-- Health / indexing status -->
  <section class="kpis" id="kpis">
    <div class="kpi"><div class="label">Indexer</div><div class="value small"><span class="status"><span id="statusDot" class="dot"></span><span id="statusText">—</span></span></div></div>
    <div class="kpi"><div class="label">Lag (ledgers)</div><div class="value" id="kLag">—</div></div>
    <div class="kpi"><div class="label">Processed ledger</div><div class="value small" id="kProcessed">—</div></div>
    <div class="kpi"><div class="label">Chain tip</div><div class="value small" id="kTip">—</div></div>
    <div class="kpi"><div class="label">Events indexed</div><div class="value" id="kEvents">—</div></div>
    <div class="kpi"><div class="label">Errors</div><div class="value" id="kErrors">—</div></div>
  </section>

  <div class="grid">
    <!-- Contracts -->
    <aside class="panel">
      <h2>Indexed contracts</h2>
      <ul class="clist" id="clist"><li class="muted" style="cursor:default">Connect to load…</li></ul>
    </aside>

    <!-- Detail -->
    <main class="panel">
      <div class="tabs" id="tabs">
        <button data-tab="events" class="active" onclick="setTab('events')">Events</button>
        <button data-tab="transfers" onclick="setTab('transfers')">Transfers</button>
        <button data-tab="state" onclick="setTab('state')">State</button>
        <button data-tab="holders" onclick="setTab('holders')">Holders</button>
        <button data-tab="interface" onclick="setTab('interface')">Interface</button>
      </div>
      <div class="detail-head" id="detailHead">
        Select a contract, or decode any one:
        <input id="anyCid" size="40" placeholder="contract id (C…)" style="margin-left:.4rem" />
        <button onclick="decodeAny()">Decode</button>
      </div>
      <div class="body" id="detail"><div class="empty">No contract selected.</div></div>
    </main>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const base = () => $('base').value.replace(/\/+$/, '');
const headers = () => $('key').value ? { 'x-api-key': $('key').value } : {};
let selected = null;
let tab = 'events';
let healthTimer = null;

function toast(msg) {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}
function fmt(n) { return (n === null || n === undefined) ? '—' : Number(n).toLocaleString(); }
function esc(s) { return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function short(s, n = 12) { s = String(s); return s.length > n * 2 ? s.slice(0, n) + '…' + s.slice(-n) : s; }
function cell(v) {
  if (v === null || v === undefined) return '<span class="muted">—</span>';
  if (typeof v === 'object') return `<code>${esc(JSON.stringify(v))}</code>`;
  return `<code>${esc(v)}</code>`;
}

async function get(path) {
  const r = await fetch(base() + path, { headers: headers() });
  if (!r.ok) {
    let msg = 'HTTP ' + r.status;
    try { const b = await r.json(); if (b.error) msg = b.error; } catch {}
    throw new Error(msg);
  }
  return r.json();
}

function connect() {
  loadHealth();
  loadContracts();
  if (healthTimer) clearInterval(healthTimer);
  healthTimer = setInterval(loadHealth, 10000);
}

async function loadHealth() {
  try {
    const h = await get('/health');
    const lag = h.lag_ledgers ?? h.lag ?? null;
    $('kLag').textContent = fmt(lag);
    $('kProcessed').textContent = fmt(h.last_processed_ledger);
    $('kTip').textContent = fmt(h.chain_tip_ledger ?? h.chain_tip);
    $('kEvents').textContent = fmt(h.events_ingested_total);
    $('kErrors').textContent = fmt(h.errors_total);
    // Status: healthy if caught up, warning if lagging, critical if far behind.
    let cls = 'good', label = 'healthy';
    if (lag === null) { cls = 'good'; label = h.status || 'up'; }
    else if (lag > 500) { cls = 'crit'; label = 'far behind'; }
    else if (lag > 50) { cls = 'warn'; label = 'lagging'; }
    $('statusDot').className = 'dot ' + cls;
    $('statusText').textContent = label;
  } catch (e) {
    $('statusDot').className = 'dot crit';
    $('statusText').textContent = 'unreachable';
    toast('Health: ' + e.message);
  }
}

async function loadContracts() {
  try {
    const rows = await get('/contracts');
    const ul = $('clist');
    if (!rows.length) { ul.innerHTML = '<li class="muted" style="cursor:default">No contracts indexed yet.</li>'; return; }
    ul.innerHTML = '';
    for (const c of rows) {
      const li = document.createElement('li');
      li.className = c.contract_id === selected ? 'active' : '';
      li.innerHTML = `<div class="cid">${esc(short(c.contract_id, 10))}</div>
        <div class="meta">${fmt(c.event_count)} events · ledgers ${fmt(c.first_seen_ledger)}–${fmt(c.last_seen_ledger)}</div>`;
      li.onclick = () => selectContract(c.contract_id);
      ul.appendChild(li);
    }
    if (!selected && rows[0]) selectContract(rows[0].contract_id);
  } catch (e) { toast('Contracts: ' + e.message); }
}

function selectContract(cid) {
  selected = cid;
  document.querySelectorAll('.clist li').forEach(li => li.classList.remove('active'));
  [...document.querySelectorAll('.clist li')].forEach(li => {
    if (li.querySelector('.cid') && cid.startsWith(li.querySelector('.cid').textContent.split('…')[0])) li.classList.add('active');
  });
  $('detailHead').innerHTML = `Contract <code>${esc(cid)}</code>`;
  loadTab();
}

function setTab(t) {
  tab = t;
  document.querySelectorAll('.tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === t));
  loadTab();
}

function table(rows, cols) {
  if (!rows || !rows.length) return '<div class="empty">Nothing here yet.</div>';
  let h = '<table><thead><tr>' + cols.map(c => `<th>${c.label}</th>`).join('') + '</tr></thead><tbody>';
  for (const r of rows) {
    h += '<tr>' + cols.map(c => `<td>${c.render ? c.render(r) : cell(r[c.key])}</td>`).join('') + '</tr>';
  }
  return h + '</tbody></table>';
}

async function loadTab() {
  if (!selected) { $('detail').innerHTML = '<div class="empty">No contract selected.</div>'; return; }
  const cid = selected;
  $('detail').innerHTML = '<div class="empty">Loading…</div>';
  try {
    if (tab === 'events') {
      const rows = await get(`/contracts/${cid}/events?limit=50`);
      $('detail').innerHTML = table(rows, [
        { label: 'Ledger', key: 'ledger' },
        { label: 'Event', render: r => `<span class="pill">${esc(r.event_name ?? r.event_type)}</span>` },
        { label: 'Typed / decoded', render: r => `<code>${esc(JSON.stringify(r.enriched ?? r.decoded_value))}</code>` },
        { label: 'Tx', render: r => `<code>${esc(short(r.tx_hash, 8))}</code>` },
      ]);
    } else if (tab === 'transfers') {
      const rows = await get(`/contracts/${cid}/transfers?limit=50`);
      $('detail').innerHTML = table(rows, [
        { label: 'Ledger', key: 'ledger' },
        { label: 'From', render: r => `<code>${esc(short(r.from_addr ?? '—', 8))}</code>` },
        { label: 'To', render: r => `<code>${esc(short(r.to_addr ?? '—', 8))}</code>` },
        { label: 'Amount', key: 'amount' },
      ]);
    } else if (tab === 'state') {
      const s = await get(`/contracts/${cid}/state?limit=1`);
      const v = s.versions && s.versions[0];
      $('detail').innerHTML = v
        ? `<div class="muted" style="padding:.4rem .6rem">Instance storage @ ledger ${fmt(v.ledger)} · captured ${esc(v.captured_at)}</div><pre>${esc(JSON.stringify(v.storage, null, 2))}</pre>`
        : '<div class="empty">No state snapshots (enable STATE_INDEXING on the indexer).</div>';
    } else if (tab === 'holders') {
      const d = await get(`/contracts/${cid}/data?label=balance&limit=200`);
      $('detail').innerHTML = table(d.keys, [
        { label: 'Holder / key', render: r => `<code>${esc(short(JSON.stringify(r.key), 14))}</code>` },
        { label: 'Value', render: r => `<code>${esc(JSON.stringify(r.value))}</code>` },
        { label: 'Ledger', key: 'ledger' },
      ]);
    } else if (tab === 'interface') {
      await renderInterface(cid);
    }
  } catch (e) {
    $('detail').innerHTML = `<div class="empty">${esc(e.message)}</div>`;
  }
}

async function renderInterface(cid) {
  const iface = await get(`/contracts/${cid}/interface`);
  const i = iface.interface || iface;
  const fns = (i.functions || []).map(f => {
    const ins = (f.inputs || []).map(a => `${a.name}: ${typeof a.type === 'object' ? JSON.stringify(a.type) : a.type}`).join(', ');
    const out = f.outputs && f.outputs.length ? ` → ${JSON.stringify(f.outputs)}` : '';
    return `<tr><td><code>${esc(f.name)}</code></td><td><code>${esc(ins)}${esc(out)}</code></td></tr>`;
  }).join('');
  const evs = (i.events || []).map(e => `<tr><td><code>${esc(e.name)}</code></td><td><code>${esc(JSON.stringify(e))}</code></td></tr>`).join('');
  $('detail').innerHTML =
    `<div class="muted" style="padding:.4rem .6rem">${(i.functions||[]).length} functions · ${(i.events||[]).length} events${iface.fetched_at ? ' · fetched ' + esc(iface.fetched_at) : ''}</div>` +
    (fns ? `<table><thead><tr><th>Function</th><th>Signature</th></tr></thead><tbody>${fns}</tbody></table>` : '') +
    (evs ? `<div style="height:.6rem"></div><table><thead><tr><th>Event</th><th>Schema</th></tr></thead><tbody>${evs}</tbody></table>` : '') ||
    '<div class="empty">No interface indexed (Stellar Asset Contracts have none).</div>';
}

async function decodeAny() {
  const cid = $('anyCid').value.trim();
  if (!cid) return;
  selected = cid; tab = 'interface';
  document.querySelectorAll('.tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === 'interface'));
  $('detailHead').innerHTML = `Contract <code>${esc(cid)}</code>`;
  $('detail').innerHTML = '<div class="empty">Decoding…</div>';
  try { await renderInterface(cid); }
  catch (e) { $('detail').innerHTML = `<div class="empty">${esc(e.message)}</div>`; }
}

// Auto-connect on load against the default base.
connect();
</script>
</body>
</html>
